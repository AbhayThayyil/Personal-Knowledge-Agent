server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths fall back to index.html so React Router
    # handles them client-side instead of nginx returning a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. Strips the /api prefix,
    # same as the Vite dev-server proxy this replaces in production.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Chat responses stream via Server-Sent Events -- buffering would
        # hold the whole response until it finished, defeating streaming.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
